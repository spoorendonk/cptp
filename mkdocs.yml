site_name: rcspp-bac
site_description: Branch-and-cut solver for the Resource Constrained Shortest Path Problem
site_url: https://spoorendonk.github.io/rcspp-bac/
repo_url: https://github.com/spoorendonk/rcspp-bac
repo_name: spoorendonk/rcspp-bac

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/spoorendonk/rcspp-bac

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started.md
    - Instance Formats: instance-formats.md
  - API:
    - Python: python-api.md
    - C++: cpp-api.md
  - Algorithms:
    - Overview: algorithms.md
    - Cut Separation: separation.md
    - Preprocessing: preprocessing.md
    - Domain Propagator: domain-propagator.md
    - Warm-Start Heuristic: warm-start-heuristic.md
  - Benchmarks: benchmarks.md
